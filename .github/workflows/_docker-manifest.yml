name: Reusable – Docker Manifest

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      registry:
        required: true
        type: string
      image_name:
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  docker-manifest:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE: ${{ inputs.registry }}/${{ inputs.image_name }}
      VERSION: ${{ inputs.release_version }}

    steps:
      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-platform manifest
        run: |
          DIGESTS=$(cat /tmp/digests/* | tr '\n' ' ')
          REFS=""
          for d in $DIGESTS; do
            REFS="$REFS ${IMAGE}@${d}"
          done

          docker manifest create ${IMAGE}:${VERSION} $REFS
          docker manifest push ${IMAGE}:${VERSION}

          # Only tag latest for stable releases (no pre-release suffix e.g. -rc.1, -beta.1)
          if [[ "$VERSION" != *"-"* ]]; then
            docker manifest create ${IMAGE}:latest $REFS
            docker manifest push ${IMAGE}:latest
          fi
