name: Reusable – Docker Windows

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      registry:
        required: true
        type: string
      image_name:
        required: true
        type: string

jobs:
  docker-windows:
    strategy:
      matrix:
        include:
          - os: windows-2022
            dockerfile: .docker/Dockerfile.windows-ltsc2022
            suffix: ltsc2022
          - os: windows-2025
            dockerfile: .docker/Dockerfile.windows-ltsc2025
            suffix: ltsc2025
    runs-on: ${{ matrix.os }}
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Windows image (${{ matrix.suffix }})
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image_name }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          SUFFIX: ${{ matrix.suffix }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          IMAGE=${REGISTRY}/${IMAGE_NAME}
          docker build \
            --file ${DOCKERFILE} \
            --build-arg APP_VERSION="${RELEASE_VERSION}" \
            --tag ${IMAGE}:${RELEASE_VERSION}-windows-${SUFFIX} \
            .
          docker push ${IMAGE}:${RELEASE_VERSION}-windows-${SUFFIX}
          mkdir -p "${RUNNER_TEMP}/digests"
          docker inspect --format='{{index .RepoDigests 0}}' ${IMAGE}:${RELEASE_VERSION}-windows-${SUFFIX} | awk -F@ '{print $2}' > "${RUNNER_TEMP}/digests/windows-${SUFFIX}"

      - name: Upload Windows digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-windows-${{ matrix.suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
